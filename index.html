// ─── Cloud helpers ─────────────────────────────────────────────────────────
// To avoid CORS preflight issues on mobile Safari, we send POST with
// Content-Type: text/plain (a "simple" request that doesn't trigger preflight).
// Apps Script's doPost reads the JSON body from e.postData.contents.
async function cloudFetch(cloudUrl, payload) {
  const res = await fetch(cloudUrl, {
    method: "POST",
    mode: "cors",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("回應非 JSON 格式:" + text.slice(0, 100));
  }
}
async function cloudLoad(cloudUrl) {
  return cloudFetch(cloudUrl, {
    action: "load"
  });
}
async function cloudSave(cloudUrl, data) {
  return cloudFetch(cloudUrl, {
    action: "save",
    data: JSON.stringify(data)
  });
}
async function cloudSavePassword(cloudUrl, pw) {
  return cloudFetch(cloudUrl, {
    action: "savePassword",
    password: pw
  });
